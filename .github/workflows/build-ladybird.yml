name: Build Ladybird

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    env:
      CC: clang-21
      CXX: clang++-21

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            autoconf \
            autoconf-archive \
            automake \
            build-essential \
            ccache \
            cmake \
            curl \
            fonts-liberation2 \
            git \
            libdrm-dev \
            libgl1-mesa-dev \
            libpulse-dev \
            libtool \
            nasm \
            ninja-build \
            pkg-config \
            python3-venv \
            qt6-base-dev \
            qt6-tools-dev-tools \
            qt6-wayland \
            tar \
            unzip \
            zip

      - name: Install LLVM 21
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21

      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Bootstrap vcpkg
        run: |
          python3 Meta/ladybird.py vcpkg bootstrap

      - name: Configure build
        run: |
          cmake --preset Release \
            -DLAGOM_LINK_POOL_SIZE=1

      - name: Build Ladybird
        run: |
          cmake --build Build/release -j2

      - name: Package artifact
        run: |
          mkdir artifact

          cp -r Build/release/bin artifact/
          cp -r Base/res artifact/

          tar -czf ladybird-linux.tar.gz artifact

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ladybird-linux
          path: ladybird-linux.tar.gz
